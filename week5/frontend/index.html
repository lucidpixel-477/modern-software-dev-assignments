<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modern Software Dev Starter</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>Modern Software Dev Starter</h1>

      <section>
        <h2>Notes</h2>
        <form id="note-form">
          <input id="note-title" placeholder="Title" required />
          <input id="note-content" placeholder="Content" required />
          <button type="submit">Add</button>
        </form>
        <form id="note-search-form">
          <input id="note-search-input" placeholder="Search notes..." />
          <select id="note-sort-select">
            <option value="created_desc">Newest first</option>
            <option value="title_asc">Title A-Z</option>
          </select>
          <button type="submit">Search</button>
        </form>
        <div class="notes-toolbar">
          <span id="notes-result-count">0 results</span>
          <div class="notes-pagination">
            <button id="notes-prev" type="button">Previous</button>
            <span id="notes-page-label">Page 1</span>
            <button id="notes-next" type="button">Next</button>
          </div>
        </div>
        <ul id="notes"></ul>
      </section>

      <section>
        <h2>Action Items</h2>
        <form id="action-form">
          <input id="action-desc" placeholder="Description" required />
          <button type="submit">Add</button>
        </form>
        <div class="actions-toolbar">
          <div class="action-filters">
            <button type="button" data-action-filter="all" class="is-active">All</button>
            <button type="button" data-action-filter="active">Active</button>
            <button type="button" data-action-filter="completed">Completed</button>
          </div>
          <div class="action-bulk-controls">
            <span id="action-selected-count">0 selected</span>
            <button id="actions-bulk-complete" type="button" disabled>Bulk Complete</button>
          </div>
        </div>
        <ul id="actions"></ul>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
