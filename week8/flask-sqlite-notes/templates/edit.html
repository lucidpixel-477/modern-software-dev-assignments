{% extends "base.html" %}

{% block title %}Edit Note - Notes Manager{% endblock %}

{% block content %}
<section class="panel">
    <div class="edit-heading">
        <h1>Edit Note</h1>
        <a href="{{ url_for('index') }}">Back to notes</a>
    </div>

    <form class="note-form" action="{{ url_for('edit_note', note_id=note['id']) }}" method="post">
        <div class="form-group">
            <label for="title">Title</label>
            <input id="title" name="title" type="text" maxlength="160" value="{{ title }}" required>
        </div>

        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" rows="10">{{ content }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit">Save Changes</button>
            <a class="button secondary" href="{{ url_for('index') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
